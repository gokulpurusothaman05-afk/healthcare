<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
  
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/preloader.css">
</head>
<body>

  <!-- SECTION 1: PRELOADER -->
  <div id="preloader">
    <div class="loader-glow">
      <div class="loader-circle"></div>
      <div class="loader-brand">S</div>
    </div>
    <div class="loader-text">Locating Diagnostic Endpoint...</div>
    <div class="loader-bar">
      <div class="loader-progress"></div>
    </div>
  </div>

  

  <!-- SECTION 3: 404 HERO GRAPHIC & MESSAGE -->
  <section class="section" style="padding-top: 160px; padding-bottom: 60px;">
    <div class="container text-center" style="text-align: center; max-width: 750px;" data-aos="zoom-in">
      <div class="section-badge" style="border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.1); color: #f87171;">
        <i class="fa-solid fa-triangle-exclamation"></i> ERROR CODE #404
      </div>
      <h1 class="gradient-text" style="font-size: 6rem; line-height: 1; margin: 10px 0;">404</h1>
      <h2 style="font-size: 2rem; margin-bottom: 16px;">Clinical Endpoint Not Found</h2>
      <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px;">
        The requested diagnostic resource or sub-domain route could not be resolved on our neural cluster.
      </p>
    </div>
  </section>

  
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
